<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ling Birthday Greeting Card Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 全局模拟网站的深邃夜蓝背景 */
        body {
            background-color: #0b0f19;
            background-image:
                radial-gradient(at 20% 20%, rgba(255, 123, 159, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(99, 179, 237, 0.12) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 毛玻璃核心特效与 Ling 粉色流光边框 */
        .glass-card {
            background: rgba(19, 26, 38, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 123, 159, 0.25);
            box-shadow:
                0 24px 50px -12px rgba(11, 15, 25, 0.7),
                0 0 30px rgba(255, 123, 159, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 30px 60px -12px rgba(11, 15, 25, 0.8),
                0 0 40px rgba(255, 123, 159, 0.25);
            border-color: rgba(255, 123, 159, 0.4);
        }

        /* 呼吸微光特效（模拟原图烛光） */
        .glow-text-gold {
            color: #FFB03A;
            text-shadow: 0 0 10px rgba(255, 176, 58, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        .glow-text-pink {
            color: #FF7B9F;
            text-shadow: 0 0 12px rgba(255, 123, 159, 0.4);
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 8px rgba(255, 176, 58, 0.4);
            }

            100% {
                text-shadow: 0 0 18px rgba(255, 176, 58, 0.8);
            }
        }

        /* 语音按钮脉冲波纹 */
        .audio-wave {
            animation: wave 1.2s infinite ease-in-out;
        }

        .audio-wave:nth-child(2) {
            animation-delay: 0.2s;
        }

        .audio-wave:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes wave {

            0%,
            100% {
                height: 8px;
            }

            50% {
                height: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-card w-full max-w-md mx-4 rounded-2xl p-6 relative overflow-hidden">

        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-sky-400 via-pink-400 to-amber-400"></div>

        <button
            class="absolute top-4 right-4 text-slate-400 hover:text-[#FF7B9F] transition-colors duration-200 focus:outline-none cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <div class="flex items-center space-x-4 mb-5 mt-2">
            <div class="relative p-[2px] bg-gradient-to-tr from-[#63B3ED] to-[#FF7B9F] rounded-full shadow-lg">
                <div
                    class="w-14 h-14 bg-[#131a26] rounded-full flex items-center justify-center text-xl overflow-hidden">
                    🐱 </div>
                <div class="absolute -top-1 -right-1 w-3 h-3 bg-[#FF7B9F] rounded-full border-2 border-[#131a26]"></div>
            </div>
            <div>
                <h3 class="font-bold text-lg text-slate-100 flex items-center gap-1.5">
                    猫耳守护骑士
                    <span
                        class="text-xs px-2 py-0.5 rounded-full bg-pink-500/10 text-[#FF7B9F] border border-pink-500/20">小天使粉丝</span>
                </h3>
                <p class="text-xs text-slate-400 mt-0.5">投递于 2026.10.15 · 第 001 号心意</p>
            </div>
        </div>

        <div class="bg-black/20 rounded-xl p-4.5 mb-5 border border-slate-800/50 min-h-[100px]">
            <p class="text-slate-200 text-[15px] leading-relaxed tracking-wide text-justify">
                祝 <span class="glow-text-pink font-semibold">Ling</span>
                生日快乐！从最初那个青涩的小直播间一路陪伴走到今天，看到屏幕前的你越来越闪耀，真的太开心、太感动了。新的一岁也要天天开心，所有的医疗包、爱心和糖果都给你准备好啦！冲鸭！🎂✨
            </p>
        </div>

        <div
            class="bg-[#1a2436]/60 border border-slate-700/40 rounded-xl p-3.5 flex items-center justify-between transition-all duration-300 hover:bg-[#1a2436]/90">
            <div class="flex items-center space-x-3">
                <button
                    class="w-10 h-10 bg-gradient-to-r from-[#FF7B9F] to-[#FFB03A] hover:opacity-90 rounded-full flex items-center justify-center shadow-md transition-transform duration-200 hover:scale-105 cursor-pointer focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-900 ml-0.5" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
                <div>
                    <span class="text-xs font-medium text-slate-300 block">点击聆听语音祝福</span>
                    <span class="text-[11px] text-slate-500 block mt-0.5">音频大小: 420 KB</span>
                </div>
            </div>

            <div class="flex items-center space-x-1 h-6 px-2">
                <span class="audio-wave w-[3px] bg-[#FFB03A] rounded-full"></span>
                <span class="audio-wave w-[3px] bg-[#FF7B9F] rounded-full"></span>
                <span class="audio-wave w-[3px] bg-[#63B3ED] rounded-full"></span>
                <span class="audio-wave w-[3px] bg-[#FF7B9F] rounded-full"></span>
                <span class="text-xs font-mono text-[#FFB03A] ml-2 font-semibold">0:12</span>
            </div>
        </div>

        <div class="flex justify-between items-center text-xs text-slate-500 pt-1">
            <div class="flex items-center gap-1">
                <span>🐷</span>
                <span>腮红小猪已收到心意</span>
            </div>
            <div class="glow-text-gold font-mono text-[11px] font-bold tracking-wider">
                MATCH LEVEL: 100%
            </div>
        </div>
    </div>

</body>

</html>
